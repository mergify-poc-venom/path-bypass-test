queue_rules:
  - name: default
    merge_method: merge
    merge_conditions:
      - "-conflict"

pull_request_rules:
  - name: queue PRs labeled poc
    conditions:
      - label = poc
    actions:
      queue:
        name: default

merge_protections:
  - name: require dependencies
    if:
      - label = poc
    success_conditions:
      - "depends-on=#1"
